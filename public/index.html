<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Hub — Game & Software</title>
  <meta name="description" content="Tải game và phần mềm miễn phí với link tốc độ cao">
  <meta property="og:title" content="Download Hub — Game & Software">
  <meta property="og:description" content="Tải game và phần mềm miễn phí với link tốc độ cao">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,800,900&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>

  <!-- Grain overlay -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Floating Nav -->
  <header class="header">
    <nav class="header-inner">
      <a href="#" class="logo" onclick="showHome()">
        <span class="logo-icon">⬡</span>
        <span>Download Hub</span>
      </a>
      <div class="header-actions">
        <div class="search-box">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Tìm..." oninput="filterGames()">
        </div>
        <button class="btn-admin" id="btnAdmin" onclick="toggleAdmin()">
          <i class="ph ph-user-circle"></i>
          <span id="adminBtnText">Admin</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Đăng nhập</h2>
        <button class="modal-close" onclick="closeLogin()">
          <i class="ph ph-x"></i>
        </button>
      </div>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Tài khoản</label>
          <input type="text" id="loginUser" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPass" required autocomplete="current-password">
        </div>
        <p class="error-msg" id="loginError"></p>
        <button type="submit" class="btn-primary btn-full">Đăng nhập</button>
      </form>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" id="tabGame" onclick="switchTab('game')">
        <i class="ph ph-game-controller"></i>
        Games
        <span class="tab-count" id="countGame">0</span>
      </button>
      <button class="tab-btn" id="tabSoftware" onclick="switchTab('software')">
        <i class="ph ph-desktop-tower"></i>
        Software
        <span class="tab-count" id="countSoftware">0</span>
      </button>
    </div>

    <!-- Home View -->
    <section id="homeView">
      <div class="games-grid" id="gamesGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">🎮</div>
        <h3>Chưa có game nào</h3>
        <p>Admin hãy đăng nhập để thêm game mới</p>
      </div>
    </section>

    <!-- Game Detail View -->
    <section id="detailView" style="display:none;">
      <button class="btn-back" onclick="showHome()">
        <i class="ph ph-arrow-left"></i>
        Quay lại
      </button>
      <div class="detail-content" id="detailContent"></div>
    </section>

    <!-- Admin View -->
    <section id="adminView" style="display:none;">
      <div class="admin-header">
        <h2 id="adminTitle">Quản lý</h2>
        <div class="admin-actions-row">
          <button class="btn-secondary" onclick="showConfigModal()">
            <i class="ph ph-gear-six"></i>
            Cấu hình
          </button>
          <button class="btn-secondary" onclick="syncAllGames()">
            <i class="ph ph-arrows-clockwise"></i>
            Sync All
          </button>
          <button class="btn-primary" id="btnAddNew" onclick="showAddForm()">
            <i class="ph ph-plus"></i>
            Thêm mới
          </button>
        </div>
      </div>

      <!-- Add/Edit Form -->
      <div class="admin-form-wrapper" id="adminFormWrapper" style="display:none;">
        <form id="gameForm" onsubmit="saveGame(event)">
          <h3 id="formTitle">Thêm Game Mới</h3>

          <div class="form-group">
            <label>Tên game *</label>
            <input type="text" id="gameName" required placeholder="VD: ICARUS v3.0 + Full DLC + Online">
          </div>
          <input type="hidden" id="gameDate">

          <div class="form-group">
            <label>Ảnh bìa (URL)</label>
            <input type="text" id="gameImage" placeholder="https://... hoặc để trống dùng ảnh mặc định">
          </div>

          <div class="form-group">
            <label>Thể loại (phân cách bởi dấu phẩy)</label>
            <input type="text" id="gameGenres" placeholder="VD: Hành động, Phiêu lưu, Sinh tồn">
          </div>

          <div class="form-group">
            <label>Nguồn tải / Mật khẩu giải nén</label>
            <div class="source-selector">
              <label class="radio-card">
                <input type="radio" name="source" value="linkneverdie.com" checked>
                <span class="radio-label">linkneverdie.com</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="source" value="hadoantv.com">
                <span class="radio-label">hadoantv.com</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Notepad URL (tự động lấy link tải)</label>
            <input type="text" id="gameNotepadUrl" placeholder="https://hadoanttvnotepad.../...">
            <small class="form-hint">Nếu có URL này, hệ thống sẽ tự động cập nhật link tải.</small>
          </div>

          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="gameAutoSync">
              Tự động sync link định kỳ (mỗi 6 giờ)
            </label>
          </div>

          <div class="form-group">
            <label>Mô tả (tuỳ chọn)</label>
            <textarea id="gameDesc" rows="3" placeholder="Mô tả ngắn về game..."></textarea>
          </div>

          <div class="form-group">
            <label>Link tải (từng part)</label>
            <div id="partsContainer"></div>
            <button type="button" class="btn-secondary" onclick="addPartInput()">
              <i class="ph ph-plus"></i>
              Thêm Part
            </button>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="cancelForm()">Huỷ</button>
            <button type="submit" class="btn-primary">Lưu</button>
          </div>
          <input type="hidden" id="editingId">
        </form>
      </div>

      <!-- Games List -->
      <div class="admin-games-list" id="adminGamesList"></div>

      <!-- Config Modal -->
      <div class="modal-overlay" id="configModal">
        <div class="modal modal-wide">
          <div class="modal-header">
            <h2>Cấu hình tài khoản</h2>
            <button class="modal-close" onclick="closeConfigModal()">
              <i class="ph ph-x"></i>
            </button>
          </div>
          <form onsubmit="saveConfig(event)">
            <h4 class="config-section-title">hadoantv.com</h4>
            <div class="form-row">
              <div class="form-group flex-1">
                <label>Username</label>
                <input type="text" id="cfgHadoanUser" placeholder="username">
              </div>
              <div class="form-group flex-1">
                <label>Password</label>
                <input type="password" id="cfgHadoanPass" placeholder="để trống giữ cũ">
              </div>
            </div>
            <h4 class="config-section-title">linkneverdie.com</h4>
            <div class="form-row">
              <div class="form-group flex-1">
                <label>Username</label>
                <input type="text" id="cfgLndUser" placeholder="username">
              </div>
              <div class="form-group flex-1">
                <label>Password</label>
                <input type="password" id="cfgLndPass" placeholder="để trống giữ cũ">
              </div>
            </div>
            <h4 class="config-section-title">GitHub (auto-push)</h4>
            <div class="form-group">
              <label>Repository (owner/repo)</label>
              <input type="text" id="cfgGithubRepo" placeholder="NguyenMinhKhoiSE172625/GameHub">
            </div>
            <div class="form-group">
              <label>Personal Access Token</label>
              <input type="password" id="cfgGithubToken" placeholder="để trống giữ cũ">
            </div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" onclick="closeConfigModal()">Huỷ</button>
              <button type="submit" class="btn-primary">Lưu</button>
            </div>
          </form>
        </div>
      </div>
    </section>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
